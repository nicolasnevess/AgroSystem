{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSystem - Cadastrar Máquina</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <link rel="stylesheet" href="{% static 'css/formularios.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-seedling"></i>
                <span>AgroSystem</span>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="{% url 'dashboard' %}"><i class="fas fa-chart-pie"></i> MONITORAMENTO</a></li>
                    <li><a href="{% url 'maquinas' %}"><i class="fas fa-tractor"></i> MÁQUINAS</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h2>Gestão de Frota</h2>
                <a href="{% url 'maquinas' %}" class="btn-back"><i class="fas fa-arrow-left"></i> Voltar</a>
            </header>

            <section class="form-card">
                <div class="form-header">
                    <i class="fas fa-tools"></i>
                    <h3>Nova Máquina / Equipamento</h3>
                    <p>Adicione novos itens à sua frota para controle de manutenção.</p>
                </div>

                <form method="POST" class="agro-form">
                    {% csrf_token %}
                    
                    <div class="input-group">
                        <label>Nome da Máquina</label>
                        <input type="text" name="nome_maquina" placeholder="Ex: Trator John Deere 6115J" required>
                    </div>

                    <div class="row-inputs">
                        <div class="input-group">
                            <label>Tipo de Equipamento</label>
                            <select name="tipo_maquina" id="select-maquina" onchange="checkMaquina(this)">
                                <option value="trator">Trator</option>
                                <option value="colheitadeira">Colheitadeira</option>
                                <option value="pulverizador">Pulverizador</option>
                                <option value="semeadora">Semeadora</option>
                                <option value="outro">Outro...</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Ano de Fabricação</label>
                            <input type="number" name="ano" placeholder="2024" min="1900" max="2026">
                        </div>
                    </div>

                    <div class="input-group" id="maquina-outro" style="display: none;">
                        <label>Especifique o Tipo</label>
                        <input type="text" name="outro_tipo" id="input-maquina-outro" placeholder="Ex: Drone, Roçadeira, Caminhão...">
                    </div>

                    <div class="input-group">
                        <label>Status Inicial</label>
                        <select name="status">
                            <option value="operacional">Operacional (Ativa)</option>
                            <option value="manutencao">Em Manutenção</option>
                            <option value="parada">Parada / Reserva</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Horímetro / KM Atual</label>
                        <input type="number" name="uso_atual" placeholder="Ex: 1500" required>
                    </div>

                    <button type="submit" class="btn-save-agro">Cadastrar na Frota</button>
                </form>
            </section>
        </main>
    </div>

    <script>
        function checkMaquina(select) {
            const campoOutro = document.getElementById('maquina-outro');
            const inputOutro = document.getElementById('input-maquina-outro');
            
            if (select.value === 'outro') {
                campoOutro.style.display = 'flex'; // Exibe o campo
                inputOutro.setAttribute('required', 'required'); // Torna obrigatório
                inputOutro.focus();
            } else {
                campoOutro.style.display = 'none'; // Esconde
                inputOutro.removeAttribute('required'); // Remove a obrigatoriedade
            }
        }
    </script>
</body>
</html>
