{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AgroSystem - Cadastrar Máquina</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <link rel="stylesheet" href="{% static 'css/formularios.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
   <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="{% url 'dashboard' %}" class="logo-link">
                    <div class="brand-box">
                        <div class="logo-placeholder">
                            <img src="{% static 'img/logo.png' %}" alt="Logo AgroSystem">
                        </div>
                    </div>
                </a>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li><a href="{% url 'dashboard' %}"><i class="fas fa-chart-pie"></i> MONITORAMENTO</a></li>
                    <li class="active"><a href="{% url 'maquinas' %}"><i class="fas fa-tractor"></i> MÁQUINAS</a></li>
                    <li><a href="{% url 'plantacoes' %}"><i class="fas fa-leaf"></i> PLANTAÇÕES</a></li>
                    <li><a href="{% url 'animais' %}"><i class="fas fa-paw"></i> ANIMAIS</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="{% url 'logout' %}" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-title">
                    <h2>Gestão de Frota</h2>
                    <p>Adicione novas máquinas ao seu inventário</p>
                </div>
                <a href="{% url 'maquinas' %}" class="btn-back"><i class="fas fa-arrow-left"></i> Voltar</a>
            </header>

            <section class="form-card">
                <div class="form-header">
                    <i class="fas fa-tools"></i>
                    <h3>Nova Máquina / Equipamento</h3>
                </div>

                <form method="POST" class="agro-form">
                    {% csrf_token %}
                    
                    <div class="input-group">
                        <label>Nome da Máquina (Apelido)</label>
                        <input type="text" name="nome" placeholder="Ex: Trator Principal" required>
                    </div>

                    <div class="row-inputs">
                        <div class="input-group">
                            <label>Tipo</label>
                            <select name="tipo" id="select-tipo" onchange="checkMaquina(this)">
                                <option value="trator">Trator</option>
                                <option value="colheitadeira">Colheitadeira</option>
                                <option value="pulverizador">Pulverizador</option>
                                <option value="plantadeira">Plantadeira</option>
                                <option value="outro">Outro</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Modelo</label>
                            <input type="text" name="modelo" placeholder="Ex: 6115J" required>
                        </div>
                    </div>

                    <div class="input-group" id="maquina-outro" style="display: none; margin-top: 10px;">
                        <label>Especifique o Tipo</label>
                        <input type="text" name="outro_tipo" id="input-outro" placeholder="Ex: Drone, Caminhão...">
                    </div>

                    <div class="row-inputs">
                        <div class="input-group">
                            <label>Identificação (Placa/Série)</label>
                            <input type="text" name="identificacao" placeholder="Ex: ABC-123" required>
                        </div>
                        <div class="input-group">
                            <label>Horímetro Atual (h)</label>
                            <input type="number" name="horimetro" value="0" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Vincular à Fazenda</label>
                        <select name="propriedade">
                            {% for f in fazendas %}
                                <option value="{{ f.id }}">{{ f.nome_fazenda }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <button type="submit" class="btn-save-agro">Adicionar</button>
                </form>
            </section>
        </main>
    </div>

    <script>
        function checkMaquina(select) {
            const campoOutro = document.getElementById('maquina-outro');
            const inputOutro = document.getElementById('input-outro');
            
            if (select.value === 'outro') {
                campoOutro.style.display = 'block';
                inputOutro.setAttribute('required', 'required');
            } else {
                campoOutro.style.display = 'none';
                inputOutro.removeAttribute('required');
            }
        }
    </script>
</body>
</html>
