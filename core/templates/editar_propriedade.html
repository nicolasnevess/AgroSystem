{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSystem - Editar Propriedade</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <link rel="stylesheet" href="{% static 'css/editar_propriedade.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="edit-page">

    <div class="form-card">
        <header class="form-header">
            <i class="fas fa-edit"></i>
            <h2>Editar Propriedade</h2>
            <p>Atualize os dados da fazenda <strong>{{ propriedade.nome_fazenda }}</strong></p>
        </header>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label><i class="fas fa-tag"></i> Nome da Fazenda</label>
                <input type="text" name="nome_fazenda" value="{{ propriedade.nome_fazenda }}" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-ruler-combined"></i> Área Total (ha)</label>
                <input type="number" step="0.1" name="area_total" value="{{ propriedade.area_total|stringformat:'s' }}" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-mountain"></i> Tipo de Solo</label>
                <select name="tipo_solo">
                    <option value="arenoso" {% if propriedade.tipo_solo == 'arenoso' %}selected{% endif %}>Arenoso</option>
                    <option value="argiloso" {% if propriedade.tipo_solo == 'argiloso' %}selected{% endif %}>Argiloso</option>
                    <option value="misto" {% if propriedade.tipo_solo == 'misto' %}selected{% endif %}>Misto / Latossolo</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-map-marker-alt"></i> Cidade</label>
                <input type="text" name="cidade" value="{{ propriedade.cidade }}" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-flag"></i> UF (Estado)</label>
                <input type="text" name="uf" value="{{ propriedade.uf }}" maxlength="2" required>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-save">Salvar Alterações</button>
                <a href="{% url 'dashboard' %}" class="btn-back">Cancelar</a>
            </div>
        </form>
    </div>

</body>
</html>
