{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSystem - Login</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="side-panel">
            <div class="brand-box">
                <div class="logo-placeholder"><i class="fas fa-seedling"></i></div>
                <h1>AgroSystem</h1>
                <p>Gestão inteligente da sua propriedade</p>
            </div>
        </div>

        <div class="form-container">
            <div class="glass-card">
                <h2 class="login-title">BEM-VINDO</h2>

                {% if form.errors %}
                    <div class="alert alert-error">
                        Usuário ou senha incorretos.
                    </div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <div class="input-group">
                        <input type="text" name="username" placeholder="Usuário" class="agro-input" required>
                    </div>
                    <div class="input-group">
                        <input type="password" name="password" placeholder="Senha" class="agro-input" required>
                    </div>
                    
                    <button type="submit" class="btn-agro">Logar</button>
                    
                    <a href="{% url 'password_reset' %}" class="forgot-password">Esqueceu sua senha?</a>
                    <p class="signup-wrapper">Não possui conta? <a href="{% url 'cadastro' %}" class="signup-link">Cadastre-se</a></p>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
