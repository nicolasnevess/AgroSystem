{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}">
    <title>NRA Agro - E-mail Enviado</title>
    <link rel="stylesheet" href="{% static 'css/password_reset_sent.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-bg">
    <div class="login-container">
        <div class="form-glass text-center">
            <div class="login-header">
                <i class="fas fa-paper-plane" style="color: #7fbd42;"></i>
                <h2>E-mail Enviado!</h2>
                <p>Enviamos as instruções para o seu e-mail. Verifique sua caixa de entrada e a pasta de spam.</p>
            </div>
            <div class="form-footer">
                <a href="{% url 'login' %}" class="btn-login-main" style="display: block; text-decoration: none;">Entendi</a>
            </div>
        </div>
    </div>
</body>
</html>
