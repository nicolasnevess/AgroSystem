{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSystem - Cadastrar Área</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <link rel="stylesheet" href="{% static 'css/formularios.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-seedling"></i>
                <span>AgroSystem</span>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="{% url 'dashboard' %}"><i class="fas fa-chart-pie"></i> MONITORAMENTO</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h2>Divisão de Glebas</h2>
                <a href="{% url 'dashboard' %}" class="btn-back"><i class="fas fa-arrow-left"></i> Voltar</a>
            </header>

            <section class="form-card">
                <div class="form-header">
                    <i class="fas fa-layer-group"></i>
                    <h3>Nova Área / Talhão</h3>
                    <p>Defina o que será monitorado nesta parte da fazenda.</p>
                </div>

                <form method="POST" class="agro-form">
                    {% csrf_token %}
                    
                    <div class="input-group">
                        <label>Identificação da Área</label>
                        <input type="text" name="nome_area" placeholder="Ex: Talhão A1 ou Gleba Sul" required>
                    </div>

                    <div class="row-inputs">
                        <div class="input-group">
                            <label>Tamanho (Hectares)</label>
                            <input type="number" name="tamanho_area" placeholder="Ex: 50" required>
                        </div>
                        <div class="input-group">
                            <label>Cultura Principal</label>
                            <select name="cultura" id="select-cultura" onchange="verificarOutro(this)">
                                <option value="soja">Soja</option>
                                <option value="milho">Milho</option>
                                <option value="cana">Cana de Açúcar</option>
                                <option value="pastagem">Pastagem / Gado</option>
                                <option value="repouso">Em Pousio (Vazio)</option>
                                <option value="outro">Outro...</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group" id="campo-outro" style="display: none;">
                        <label>Especifique a Cultura</label>
                        <input type="text" name="outra_cultura" id="input-outro" placeholder="Ex: Café, Algodão, Feijão...">
                    </div>

                    <div class="input-group">
                        <label>Data de Início do Plantio</label>
                        <input type="date" name="data_plantio">
                    </div>

                    <button type="submit" class="btn-save-agro">Salvar Área</button>
                </form>
            </section>
        </main>
    </div>

    <script>
        function verificarOutro(select) {
            const campoOutro = document.getElementById('campo-outro');
            const inputOutro = document.getElementById('input-outro');
            
            if (select.value === 'outro') {
                campoOutro.style.display = 'flex';
                inputOutro.setAttribute('required', 'required');
                inputOutro.focus();
            } else {
                campoOutro.style.display = 'none';
                inputOutro.removeAttribute('required');
            }
        }
    </script>
</body>
</html>
