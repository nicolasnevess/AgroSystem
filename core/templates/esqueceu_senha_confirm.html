{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Sistema - Nova Senha</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="side-panel">
            <div class="brand-box">
                <div class="logo-placeholder"><i class="fas fa-seedling"></i></div>
                <h1>AgroSystem</h1>
                <p>Gestão inteligente da sua propriedade</p>
            </div>
        </div>

        <div class="form-container">
            <div class="glass-card">
                <h2 class="login-title">NOVA SENHA</h2>
                
                <form method="POST">
                    {% csrf_token %}
                    <input type="password" name="new_password" placeholder="Nova Senha" class="agro-input" required>
                    <input type="password" name="confirm_password" placeholder="Confirmar Nova Senha" class="agro-input" required>
                    <button type="submit" class="btn-agro">Atualizar Senha</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
