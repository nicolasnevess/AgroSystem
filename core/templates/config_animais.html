{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSystem - Registrar Animais</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <link rel="stylesheet" href="{% static 'css/formularios.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-seedling"></i>
                <span>AgroSystem</span>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="{% url 'dashboard' %}"><i class="fas fa-chart-pie"></i> MONITORAMENTO</a></li>
                    <li><a href="{% url 'animais' %}"><i class="fas fa-paw"></i> ANIMAIS</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h2>Gestão de Rebanho</h2>
                <a href="{% url 'animais' %}" class="btn-back"><i class="fas fa-arrow-left"></i> Voltar</a>
            </header>

            <section class="form-card">
                <div class="form-header">
                    <i class="fas fa-clipboard-list"></i>
                    <h3>Registrar Animais</h3>
                    <p>Informe o tipo e a quantidade de animais na propriedade.</p>
                </div>

                <form method="POST" class="agro-form">
                    {% csrf_token %}
                    
                    <div class="row-inputs">
                        <div class="input-group">
                            <label>Tipo de Animal</label>
                            <select name="tipo_animal" id="select-animal" onchange="checkAnimal(this)">
                                <option value="bovino">Bovinos (Gado)</option>
                                <option value="equino">Equinos (Cavalos)</option>
                                <option value="suino">Suínos (Porcos)</option>
                                <option value="ovino">Ovinos (Ovelhas)</option>
                                <option value="outro">Outro...</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Quantidade (Cabeças)</label>
                            <input type="number" name="quantidade" placeholder="Ex: 150" required min="1">
                        </div>
                    </div>

                    <div class="input-group" id="animal-outro" style="display: none;">
                        <label>Especifique o Tipo</label>
                        <input type="text" name="outro_tipo" id="input-animal-outro" placeholder="Ex: Caprinos, Aves...">
                    </div>

                    <div class="input-group">
                        <label>Raça ou Categoria (Opcional)</label>
                        <input type="text" name="raca" placeholder="Ex: Nelore, Angus, Quarto de Milha...">
                    </div>

                    <div class="input-group">
                        <label>Localização (Pasto/Galpão)</label>
                        <input type="text" name="localizacao" placeholder="Ex: Pasto 02, Curral Norte...">
                    </div>

                    <button type="submit" class="btn-save-agro">Salvar Registro</button>
                </form>
            </section>
        </main>
    </div>

    <script>
        function checkAnimal(select) {
            const campoOutro = document.getElementById('animal-outro');
            const inputOutro = document.getElementById('input-animal-outro');
            
            if (select.value === 'outro') {
                campoOutro.style.display = 'flex';
                inputOutro.setAttribute('required', 'required');
                inputOutro.focus();
            } else {
                campoOutro.style.display = 'none';
                inputOutro.removeAttribute('required');
            }
        }
    </script>
</body>
</html>
