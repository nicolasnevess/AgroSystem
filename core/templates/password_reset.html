{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}">
    <title>NRA Agro - Recuperar Senha</title>
    <link rel="stylesheet" href="{% static 'css/password_reset.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-bg">
    <div class="login-container">
        <form method="POST" class="form-glass">
            {% csrf_token %}
            <div class="login-header">
                <i class="fas fa-lock-open"></i>
                <h2>Recuperar Senha</h2>
                <p>Digite seu e-mail para receber o link de redefinição.</p>
            </div>
            <div class="input-group">
                <label>E-mail cadastrado</label>
                <div class="input-with-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" required placeholder="seu@email.com">
                </div>
            </div>
            <button type="submit" class="btn-login-main">Enviar Link</button>
            <div class="form-footer">
                <a href="{% url 'login' %}">Voltar para o Login</a>
            </div>
        </form>
    </div>
</body>
</html>
