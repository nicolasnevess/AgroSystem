{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSystem - Cadastro</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="side-panel">
            <div class="brand-box">
                <div class="logo-placeholder"><i class="fas fa-seedling"></i></div>
                <h1>AgroSystem</h1>
                <p>Gestão inteligente da sua propriedade</p>
            </div>
        </div>

        <div class="form-container">
            <div class="glass-card">
                <h2 class="login-title">CADASTRO</h2>
                <form method="POST">
                    {% csrf_token %}
                    <input type="text" name="first_name" placeholder="Nome" class="agro-input" required>
                    <input type="email" name="email" placeholder="E-mail" class="agro-input" required>
                    <input type="text" name="username" placeholder="Usuário" class="agro-input" required>
                    <input type="password" name="password" placeholder="Senha" class="agro-input" required>
                    <button type="submit" class="btn-agro">Cadastrar</button>
                    
                    <p class="signup-wrapper">Já tem conta? <a href="{% url 'login' %}" class="signup-link">Faça Login</a></p>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
